<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560" role="img" aria-labelledby="title desc">
  <title id="title">Capacity evolution in the snapshot and pathway solutions with dual y axes</title>
  <desc id="desc">Step scatterplot of pathway capacities from 2026 to 2060 with annualized snapshot markers at 2040. The 2040 pathway values are carried forward to 2060. PV and battery capacities use the left y axis, and CCGT capacity uses the right y axis.</desc>
  <style>
    text {
      fill: #273142;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      font-size: 14px;
    }
    .axis {
      stroke: #273142;
      stroke-width: 1.2;
      vector-effect: non-scaling-stroke;
    }
    .right-axis-line {
      stroke: #5a84d6;
    }
    .grid {
      stroke: #d9dee8;
      stroke-width: 1;
      vector-effect: non-scaling-stroke;
    }
    .tick {
      stroke: #273142;
      stroke-width: 1;
      vector-effect: non-scaling-stroke;
    }
    .right-tick {
      stroke: #5a84d6;
    }
    .label {
      font-size: 16px;
    }
    .legend {
      font-size: 13px;
    }
    .technology-label {
      font-size: 15px;
      font-weight: 600;
    }
    .pv {
      stroke: #d98200;
      fill: #d98200;
    }
    .battery {
      stroke: #8f372b;
      fill: #8f372b;
    }
    .ccgt {
      stroke: #5a84d6;
      fill: #5a84d6;
    }
    .pv-label {
      fill: #d98200;
    }
    .battery-label {
      fill: #8f372b;
    }
    .ccgt-label,
    .right-axis text {
      fill: #5a84d6;
    }
    .series {
      fill: none;
      stroke-linejoin: round;
      stroke-width: 2.4;
      vector-effect: non-scaling-stroke;
    }
    .marker {
      stroke-width: 1.4;
      vector-effect: non-scaling-stroke;
    }
    .snapshot {
      fill: #fff;
      stroke-width: 2;
      vector-effect: non-scaling-stroke;
    }
  </style>

  <rect width="1000" height="560" fill="#fff"/>

  <g aria-hidden="true">
    <line class="grid" x1="90" y1="482" x2="900" y2="482"/>
    <line class="grid" x1="90" y1="400" x2="900" y2="400"/>
    <line class="grid" x1="90" y1="318" x2="900" y2="318"/>
    <line class="grid" x1="90" y1="236" x2="900" y2="236"/>
    <line class="grid" x1="90" y1="154" x2="900" y2="154"/>
    <line class="grid" x1="90" y1="72" x2="900" y2="72"/>

    <line class="grid" x1="90" y1="72" x2="90" y2="482"/>
    <line class="grid" x1="185.3" y1="72" x2="185.3" y2="482"/>
    <line class="grid" x1="423.5" y1="72" x2="423.5" y2="482"/>
    <line class="grid" x1="661.8" y1="72" x2="661.8" y2="482"/>
    <line class="grid" x1="900" y1="72" x2="900" y2="482"/>
  </g>

  <line class="axis" x1="90" y1="482" x2="900" y2="482"/>
  <line class="axis" x1="90" y1="72" x2="90" y2="482"/>
  <line class="axis right-axis-line" x1="900" y1="72" x2="900" y2="482"/>

  <g text-anchor="end">
    <text x="78" y="487">0</text>
    <text x="78" y="405">100</text>
    <text x="78" y="323">200</text>
    <text x="78" y="241">300</text>
    <text x="78" y="159">400</text>
    <text x="78" y="77">500</text>
  </g>

  <g class="right-axis" text-anchor="start">
    <text x="922" y="487">0</text>
    <text x="922" y="405">3</text>
    <text x="922" y="323">6</text>
    <text x="922" y="241">9</text>
    <text x="922" y="159">12</text>
    <text x="922" y="77">15</text>
  </g>

  <g text-anchor="middle">
    <line class="tick" x1="90" y1="482" x2="90" y2="489"/>
    <text x="90" y="516">2026</text>
    <line class="tick" x1="185.3" y1="482" x2="185.3" y2="489"/>
    <text x="185.3" y="516">2030</text>
    <line class="tick" x1="423.5" y1="482" x2="423.5" y2="489"/>
    <text x="423.5" y="516">2040</text>
    <line class="tick" x1="661.8" y1="482" x2="661.8" y2="489"/>
    <text x="661.8" y="516">2050</text>
    <line class="tick" x1="900" y1="482" x2="900" y2="489"/>
    <text x="900" y="516">2060</text>
  </g>

  <g aria-hidden="true">
    <line class="tick right-tick" x1="900" y1="482" x2="907" y2="482"/>
    <line class="tick right-tick" x1="900" y1="400" x2="907" y2="400"/>
    <line class="tick right-tick" x1="900" y1="318" x2="907" y2="318"/>
    <line class="tick right-tick" x1="900" y1="236" x2="907" y2="236"/>
    <line class="tick right-tick" x1="900" y1="154" x2="907" y2="154"/>
    <line class="tick right-tick" x1="900" y1="72" x2="907" y2="72"/>
  </g>

  <text class="label" x="495" y="546" text-anchor="middle">Year</text>
  <text class="label" x="34" y="277" text-anchor="middle" transform="rotate(-90 34 277)">PV and battery capacity (MW)</text>
  <text class="label ccgt-label" x="972" y="277" text-anchor="middle" transform="rotate(90 972 277)">CCGT capacity (MW)</text>

  <g transform="translate(96 37)">
    <path d="M0 0 H32" fill="none" stroke="#273142" stroke-width="2.2"/>
    <circle cx="16" cy="0" r="4.5" fill="#273142"/>
    <text class="legend" x="42" y="5">pathway step</text>
    <path d="M178 -7 L186 0 L178 7 L170 0 Z" fill="#fff" stroke="#273142" stroke-width="2"/>
    <text class="legend" x="198" y="5">annualized snapshot</text>
  </g>

  <g aria-label="Pathway capacity step series">
    <path class="series pv" d="M90 170.8 H137.6 V168.2 H185.3 V147.7 H232.9 V147 H304.4 H352.1 H423.5 V139.8 H900"/>
    <circle class="marker pv" cx="90" cy="170.8" r="4.2"/>
    <circle class="marker pv" cx="137.6" cy="168.2" r="4.2"/>
    <circle class="marker pv" cx="185.3" cy="147.7" r="4.2"/>
    <circle class="marker pv" cx="232.9" cy="147" r="4.2"/>
    <circle class="marker pv" cx="304.4" cy="147" r="4.2"/>
    <circle class="marker pv" cx="352.1" cy="147" r="4.2"/>
    <circle class="marker pv" cx="423.5" cy="139.8" r="4.2"/>

    <path class="series battery" d="M90 321.9 H137.6 V320.8 H185.3 V298.4 H232.9 H304.4 H352.1 H423.5 H900"/>
    <circle class="marker battery" cx="90" cy="321.9" r="4.2"/>
    <circle class="marker battery" cx="137.6" cy="320.8" r="4.2"/>
    <circle class="marker battery" cx="185.3" cy="298.4" r="4.2"/>
    <circle class="marker battery" cx="232.9" cy="298.4" r="4.2"/>
    <circle class="marker battery" cx="304.4" cy="298.4" r="4.2"/>
    <circle class="marker battery" cx="352.1" cy="298.4" r="4.2"/>
    <circle class="marker battery" cx="423.5" cy="298.4" r="4.2"/>

    <path class="series ccgt" d="M90 72 H137.6 H185.3 V158.4 H232.9 H304.4 H352.1 H423.5 V232.6 H900"/>
    <circle class="marker ccgt" cx="90" cy="72" r="4.2"/>
    <circle class="marker ccgt" cx="137.6" cy="72" r="4.2"/>
    <circle class="marker ccgt" cx="185.3" cy="158.4" r="4.2"/>
    <circle class="marker ccgt" cx="232.9" cy="158.4" r="4.2"/>
    <circle class="marker ccgt" cx="304.4" cy="158.4" r="4.2"/>
    <circle class="marker ccgt" cx="352.1" cy="158.4" r="4.2"/>
    <circle class="marker ccgt" cx="423.5" cy="232.6" r="4.2"/>
  </g>

  <g aria-label="Annualized snapshot capacity markers">
    <path class="snapshot pv" d="M423.5 98.9 L432 107.4 L423.5 115.9 L415 107.4 Z"/>
    <path class="snapshot battery" d="M423.5 270.7 L432 279.2 L423.5 287.7 L415 279.2 Z"/>
    <path class="snapshot ccgt" d="M423.5 376.1 L432 384.6 L423.5 393.1 L415 384.6 Z"/>
  </g>

  <text class="technology-label pv-label" x="842" y="133">PV</text>
  <text class="technology-label battery-label" x="786" y="292">Battery</text>
  <text class="technology-label ccgt-label" x="760" y="226">CCGT</text>
</svg>
