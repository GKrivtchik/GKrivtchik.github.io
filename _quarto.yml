project:
  type: website
  output-dir: docs
  post-render:
    - scripts/normalize-sitemap.sh
  resources:
    - favicon.ico
    - favicon-16x16.png
    - favicon-32x32.png

website:
  title: "Energy modelling blog"
  site-url: "https://gkrivtchik.com"
  description: "A personal website and blog about energy systems modelling"
  open-graph: true
  twitter-card: true
  search: false
  navbar:
    title: false
    left:
      - text: home
        href: index.qmd
      - text: blog
        href: posts/index.qmd
      - text: github
        href: https://github.com/GKrivtchik
      - text: linkedin
        href: https://www.linkedin.com/in/guillaume-krivtchik-29b96693/
  page-footer:
    left: "Guillaume Krivtchik"
    center: "Opinions expressed here are my own and do not reflect the views of my employer."
    right:
      - text: rss
        href: posts/index.xml

format:
  html:
    theme: cosmo
    css: styles.css
    canonical-url: true
    toc: false
    code-copy: true
    anchor-sections: true
    smooth-scroll: true
    include-in-header: scripts/favicon-links.html
    include-after-body: scripts/post-category-links.html

execute:
  freeze: auto
